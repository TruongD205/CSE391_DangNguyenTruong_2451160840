<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>ShopVN — Component Architecture</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
      }
      .navbar {
        background: #2c3e50;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar .logo {
        color: #3498db;
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
      }
      .navbar .nav-links {
        display: flex;
        gap: 1.5rem;
      }
      .navbar .nav-links a {
        color: white;
        text-decoration: none;
      }
      .hero {
        background: linear-gradient(135deg, #3498db, #2c3e50);
        color: white;
        text-align: center;
        padding: 4rem 2rem;
      }
      .hero h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      .hero p {
        font-size: 1.2rem;
        margin-bottom: 1.5rem;
        opacity: 0.9;
      }
      .hero button {
        padding: 12px 30px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 1rem;
        cursor: pointer;
      }
      .products {
        padding: 2rem;
        max-width: 1000px;
        margin: 0 auto;
      }
      .products h2 {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1.5rem;
      }
      .product-card {
        border: 1px solid #ddd;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.3s;
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }
      .product-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }
      .product-card .info {
        padding: 1rem;
      }
      .product-card h3 {
        margin-bottom: 0.3rem;
      }
      .product-card .price {
        color: #e74c3c;
        font-weight: bold;
        margin-bottom: 0.8rem;
      }
      .product-card button {
        width: 100%;
        padding: 8px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: #999;
      }
      footer {
        background: #2c3e50;
        color: white;
        text-align: center;
        padding: 1.5rem;
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      function Navbar({ logo, links }) {
        return (
          <nav className="navbar">
            <a href="/" className="logo">
              {logo}
            </a>
            <div className="nav-links">
              {links.map((link) => (
                <a key={link.href} href={link.href}>
                  {link.label}
                </a>
              ))}
            </div>
          </nav>
        );
      }

      function Hero({ title, subtitle, buttonText }) {
        return (
          <section className="hero">
            <h1>{title}</h1>
            <p>{subtitle}</p>
            <button>{buttonText}</button>
          </section>
        );
      }

      function ProductCard({ image, name, price }) {
        return (
          <div className="product-card">
            <img src={image} alt={name} />
            <div className="info">
              <h3>{name}</h3>
              <p className="price">{price}</p>
              <button>Thêm vào giỏ</button>
            </div>
          </div>
        );
      }

      function ProductGrid({ title, products }) {
        if (products.length === 0) {
          return <div className="empty-state">Chưa có sản phẩm</div>;
        }
        return (
          <section className="products">
            <h2>{title}</h2>
            <div className="product-grid">
              {products.map((product) => (
                <ProductCard key={product.id} image={product.image} name={product.name} price={product.price} />
              ))}
            </div>
          </section>
        );
      }

      function Footer({ text }) {
        return (
          <footer>
            <p>{text}</p>
          </footer>
        );
      }

      function App() {
        const navLinks = [
          { label: "Giới thiệu", href: "#about" },
          { label: "Sản phẩm", href: "#products" },
          { label: "Liên hệ", href: "#contact" },
        ];

        const products = [
          { id: 1, name: "Áo thun nam", price: "250.000đ", image: "https://picsum.photos/300/200?random=1" },
          { id: 2, name: "Quần jean nữ", price: "450.000đ", image: "https://picsum.photos/300/200?random=2" },
          { id: 3, name: "Giày sneaker", price: "890.000đ", image: "https://picsum.photos/300/200?random=3" },
          { id: 4, name: "Túi xách", price: "350.000đ", image: "https://picsum.photos/300/200?random=4" },
        ];

        return (
          <div>
            <Navbar logo="ShopVN" links={navLinks} />
            <Hero title="Chào mừng đến với ShopVN" subtitle="Nơi mua sắm trực tuyến uy tín" buttonText="Mua ngay" />
            <ProductGrid title="Sản phẩm nổi bật" products={products} />
            <Footer text="© 2026 ShopVN. All rights reserved." />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
